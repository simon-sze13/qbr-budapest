name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs dependencies
        run: pip install -r instructor/mkdocs/requirements-ci.txt

      - name: Build documentation
        working-directory: instructor/mkdocs
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: mkdocs build --strict

      - name: Verify MkDocs output
        run: test -f instructor/mkdocs/build/index.html && ls -la instructor/mkdocs/build | head -20

      - uses: actions/upload-pages-artifact@v3
        with:
          path: instructor/mkdocs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
