site_name: "QBR — Cloudera Cloud Factory Workshop"
site_description: Hands-on workshop guide for the Cloudera Cloud Factory QBR demo.
site_author: Cloudera
site_url: https://simon-sze13.github.io/qbr-budapest/
copyright: Copyright &copy; 2026 Cloudera, Inc. All rights reserved.<br><a href="https://www.cloudera.com/legal/terms-and-conditions.html" target="_blank" rel="noopener">Terms &amp; Conditions</a> · <a href="https://www.cloudera.com/legal/policies.html" target="_blank" rel="noopener">Privacy Policy</a>
repo_url: https://github.com/simon-sze13/qbr-budapest
repo_name: GitHub
edit_uri: edit/main/content/

theme:
    name: material
    logo: assets/images/logo-cloudera-white.svg
    favicon: assets/images/favicon.svg
    palette:
    - scheme: default
      primary: custom
      accent: custom
    features:
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight

docs_dir: '../../content'
site_dir: './build'
extra_css:
  - assets/stylesheets/extra.css
extra_javascript:
  - assets/javascripts/username-replacer.js
use_directory_urls: true

nav:
    - Home: README.md
    - Labs:
        - Environment & project: labs/environment-setup.md
        - Exposing applications:
            - Overview: labs/exposing-applications/index.md
            - "01 · Kubernetes DNS — basics": labs/exposing-applications/01-kubernetes-dns-basics.md
            - "02 · LoadBalancer": labs/exposing-applications/02-loadbalancer.md
            - "03 · Taikun Ingress — basics": labs/exposing-applications/03-taikun-ingress-basics.md
            - "04 · Taikun Ingress — Managed Apps": labs/exposing-applications/04-taikun-ingress-managed-apps.md
            - "05 · Taikun Ingress — CertManager": labs/exposing-applications/05-taikun-ingress-certmanager.md
            - "06 · Taikun Link": labs/exposing-applications/06-taikun-link.md
        - Workshop wrap-up: labs/workshop-wrap-up.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.blocks.html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - sane_lists: {}
  - toc:
      toc_depth: 3

extra:
    generator: false

plugins:
  - same-dir
  - search
  - markdownextradata: {}
  - glightbox
  - macros
