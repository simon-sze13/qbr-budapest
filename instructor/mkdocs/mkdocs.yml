site_name: "CCF MCP Workshop"
site_description: Workshop — Cloudera Cloud Factory custom MCP server, app-latest API, and Cursor stdio setup.
site_author: Cloudera
site_url: https://simon-sze13.github.io/qbr-budapest/
copyright: Copyright &copy; 2026 Cloudera, Inc. All rights reserved.<br><a href="https://www.cloudera.com/legal/terms-and-conditions.html" target="_blank" rel="noopener">Terms &amp; Conditions</a> · <a href="https://www.cloudera.com/legal/policies.html" target="_blank" rel="noopener">Privacy Policy</a>
repo_url: https://github.com/simon-sze13/qbr-budapest
repo_name: GitHub
edit_uri: edit/main/content/

theme:
    name: material
    logo: assets/images/logo-cloudera-white.svg
    favicon: assets/images/favicon.svg
    palette:
    - scheme: default
      primary: custom
      accent: custom
    features:
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight

docs_dir: '../../content'
site_dir: './build'
extra_css:
  - assets/stylesheets/extra.css
use_directory_urls: true

nav:
    - Home: README.md
    - MCP workshop:
        - Overview: mcp/index.md
        - Prerequisites: mcp/prerequisites.md
        - Install & build: mcp/install.md
        - Configuration: mcp/configuration.md
        - Cursor & stdio: mcp/cursor.md
        - Tool reference: mcp/tools.md
        - "Lab 1 — First connection": mcp/lab-01-connection.md
        - "Lab 2 — Projects & catalogs": mcp/lab-02-projects-catalogs.md
        - Resources: mcp/resources.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.blocks.html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - sane_lists: {}
  - toc:
      toc_depth: 3

extra:
    generator: false

plugins:
  - same-dir
  - search
  - markdownextradata: {}
  - glightbox
  - macros
